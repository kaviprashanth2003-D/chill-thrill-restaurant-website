<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Chill Thrill</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <!-- ========================================== -->
    <!-- LOADER SECTION                             -->
    <!-- Displays a spinning animation while loading-->
    <!-- ========================================== -->
    <div class="loader"><div class="spinner"></div></div>

    <!-- ========================================== -->
    <!-- NAVIGATION BAR                             -->
    <!-- Contains logo, links, auth state & theme   -->
    <!-- ========================================== -->
    <header class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">Chill<span class="text-pink">Thrill</span></a>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="menu.html">Menu</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
          <a href="admin.html" id="nav-admin-link" style="display: none;">Admin</a>
        </nav>
        <div class="nav-actions">
          <div id="auth-nav" style="display:flex; align-items:center; margin-right: 15px;"></div>
          <button id="theme-toggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
          <button class="hamburger" aria-label="Menu"><i class="fas fa-bars"></i></button>
        </div>
      </div>
    </header>

    <!-- ========================================== -->
    <!-- SIGNUP FORM SECTION                        -->
    <!-- New user account registration              -->
    <!-- ========================================== -->
    <div class="container auth-wrapper">
        <div class="auth-card animate-text">
            <h2 class="modal-title" style="margin-bottom:10px;">Join the <span>Thrill</span></h2>
            <p class="modal-subtitle" style="margin-bottom:30px;">Create your account to streamline checkout and track orders.</p>
            
            <form id="signup-form" onsubmit="window.registerUser(event)">
                <div class="input-container">
                    <input type="text" id="reg-name" class="adv-input" required placeholder="Full Name">
                    <i class="fas fa-user input-icon"></i>
                </div>
                <div class="form-row">
                    <div class="input-container">
                        <input type="email" id="reg-email" class="adv-input" required placeholder="Email Address">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                    <div class="input-container">
                        <input type="tel" id="reg-phone" class="adv-input" required placeholder="Phone Number">
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-container">
                        <input type="password" id="reg-pass" class="adv-input" required placeholder="Password" minlength="6">
                        <i class="fas fa-lock input-icon"></i>
                        <i class="fas fa-eye show-pass-icon" onclick="window.togglePassword('reg-pass')"></i>
                    </div>
                    <div class="input-container">
                        <input type="password" id="reg-confirm-pass" class="adv-input" required placeholder="Confirm Password" minlength="6">
                        <i class="fas fa-shield-alt input-icon"></i>
                        <i class="fas fa-eye show-pass-icon" onclick="window.togglePassword('reg-confirm-pass')"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-place-order" style="margin-top: 15px;">Create Account <i class="fas fa-user-plus" style="margin-left: 8px;"></i></button>
                <p class="auth-switch">Already registered? <a href="login.html">Sign In Here</a></p>
            </form>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- FOOTER SECTION                             -->
    <!-- Links, social icons, and copyright info     -->
    <!-- ========================================== -->
    <footer class="footer">
      <div class="container footer-grid">
        <div class="footer-col">
          <h3>Chill<span class="text-pink">Thrill</span></h3>
          <p>Experience the ultimate fusion of taste and aesthetics.</p>
          <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Chill Thrill. All rights reserved.</p>
      </div>
    </footer>
    <script src="script.js?v=3"></script>
</body>
</html>
