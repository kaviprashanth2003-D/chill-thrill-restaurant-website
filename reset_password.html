<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Chill Thrill</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="loader"><div class="spinner"></div></div>

    <header class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">Chill<span class="text-pink">Thrill</span></a>
      </div>
    </header>

    <div class="container auth-wrapper">
        <div class="auth-card animate-text">
            <h2 class="modal-title" style="margin-bottom:10px;">Reset <span>Password</span></h2>
            <p class="modal-subtitle" style="margin-bottom:30px;">Enter your new credentials to regain access.</p>
            
            <form id="reset-password-form" onsubmit="window.resetPassword(event)">
                <input type="hidden" id="reset-email">
                
                <div class="input-container">
                    <input type="password" id="new-password" class="adv-input" required placeholder="New Password">
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye show-pass-icon" onclick="window.togglePassword('new-password')"></i>
                </div>
                
                <div class="input-container" style="margin-bottom: 25px;">
                    <input type="password" id="confirm-new-password" class="adv-input" required placeholder="Confirm New Password">
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye show-pass-icon" onclick="window.togglePassword('confirm-new-password')"></i>
                </div>
                
                <button type="submit" class="btn-place-order">Reset Password <i class="fas fa-key" style="margin-left: 8px;"></i></button>
            </form>
        </div>
    </div>

    <script src="script.js?v=4"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            if (email) {
                document.getElementById('reset-email').value = email;
            } else {
                window.showToast("No email provided. Redirecting...", "error");
                setTimeout(() => window.location.href = "login.html", 2000);
            }
        });
    </script>
</body>
</html>
